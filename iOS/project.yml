name: Potbound
options:
  bundleIdPrefix: com.shimondeitel.potbound
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Potbound:
    type: application
    platform: iOS
    sources:
      - path: Potbound
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.potbound
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Potbound/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PotboundTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PotboundTests
      - path: Potbound.storekit
    dependencies:
      - target: Potbound
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.potbound.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PotboundUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PotboundUITests
    dependencies:
      - target: Potbound
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.potbound.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Potbound:
    build:
      targets:
        Potbound: all
        PotboundTests: [test]
        PotboundUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Potbound.storekit
    test:
      config: Debug
      storeKitConfiguration: Potbound.storekit
      targets:
        - PotboundTests
        - PotboundUITests
    archive:
      config: Release
